spring:
  application:
    name: 2026-usw-festival-web-backend
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USEhttps://github.com/usw-festival26/2026-usw-festival-web-backend/blob/5b7d0a58c02cd0e482d14f89a94a600f52700db2/src/main/resources/application.ymlRNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: true
      data-source-properties:
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        show_sql: true
        format_sql: true

server:
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: none

app:
  security:
    cors:
      allowed-origins: ${ADMIN_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8081,https://*.uswfestival26-admin.pages.dev,https://*.uswfestival26.pages.dev,https://uswfestival26-admin.pages.dev,https://uswfestival26.pages.dev,https://admin.usw-festival.site,https://usw-festival.site}
