spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

server:
  servlet:
    session:
      cookie:
        name: FESTIVALSESSION
        http-only: true
        secure: true
        same-site: none

app:
  security:
    cors:
      allowed-origins:
        - https://admin.example.com
