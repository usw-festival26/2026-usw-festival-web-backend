name: Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Test and build with Gradle
        run: ./gradlew clean test bootJar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          fingerprint: ${{ secrets.EC2_HOST_FINGERPRINT }}
          source: "build/libs/*.jar"
          target: "/home/${{ secrets.EC2_USERNAME }}/deploy"
          strip_components: 2

      - name: Deploy and verify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          fingerprint: ${{ secrets.EC2_HOST_FINGERPRINT }}
          script: |
            set -eu

            APP_NAME="festival-api"
            DEPLOY_PATH="/home/${{ secrets.EC2_USERNAME }}/deploy"
            INSTALL_PATH="/opt/$APP_NAME"
            HEALTH_URL="http://127.0.0.1:8080/actuator/health"

            echo ">>> 배포를 시작합니다"

            sudo mkdir -p "$INSTALL_PATH"
            sudo mv "$DEPLOY_PATH"/*.jar "$INSTALL_PATH/$APP_NAME.jar"

            sudo systemctl restart "$APP_NAME"

            for i in $(seq 1 12); do
              if curl -fsS "$HEALTH_URL" | grep -q '"status":"UP"'; then
                echo "✅ 배포 성공!"
                rm -rf "$DEPLOY_PATH"
                exit 0
              fi
              sleep 5
            done

            echo "❌ 헬스 체크 실패"
            sudo systemctl status "$APP_NAME" --no-pager
            exit 1